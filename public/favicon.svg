<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#0b1a0b"/>
  <!-- Left reel (center 40, 60) size=56 → r=28 -->
  <!-- Spool ring -->
  <circle cx="40" cy="60" r="23.8" fill="none" stroke="#66ff99" stroke-width="2" opacity="0.3"/>
  <!-- Tape area -->
  <circle cx="40" cy="60" r="16.66" fill="#66ff99" opacity="0.08"/>
  <!-- 3 Spokes at 0°, 120°, 240° -->
  <line x1="40" y1="60" x2="61.8" y2="60" stroke="#66ff99" stroke-width="2.24" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="60" x2="29.1" y2="41.12" stroke="#66ff99" stroke-width="2.24" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="60" x2="29.1" y2="78.88" stroke="#66ff99" stroke-width="2.24" stroke-linecap="round" opacity="0.5"/>
  <!-- Hub -->
  <circle cx="40" cy="60" r="6.16" fill="#66ff99" opacity="0.6"/>
  <!-- Hub hole -->
  <circle cx="40" cy="60" r="2.46" fill="#0b1a0b"/>

  <!-- Right reel (center 88, 60) -->
  <circle cx="88" cy="60" r="23.8" fill="none" stroke="#66ff99" stroke-width="2" opacity="0.3"/>
  <circle cx="88" cy="60" r="16.66" fill="#66ff99" opacity="0.08"/>
  <line x1="88" y1="60" x2="109.8" y2="60" stroke="#66ff99" stroke-width="2.24" stroke-linecap="round" opacity="0.5"/>
  <line x1="88" y1="60" x2="77.1" y2="41.12" stroke="#66ff99" stroke-width="2.24" stroke-linecap="round" opacity="0.5"/>
  <line x1="88" y1="60" x2="77.1" y2="78.88" stroke="#66ff99" stroke-width="2.24" stroke-linecap="round" opacity="0.5"/>
  <circle cx="88" cy="60" r="6.16" fill="#66ff99" opacity="0.6"/>
  <circle cx="88" cy="60" r="2.46" fill="#0b1a0b"/>
</svg>
