<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background matching mpump -->
  <rect width="32" height="32" rx="6" fill="#0b1a0b"/>
  <!-- Left reel -->
  <circle cx="11" cy="13" r="6" fill="none" stroke="#66ff99" stroke-width="1.5" opacity="0.4"/>
  <circle cx="11" cy="13" r="4" fill="#66ff99" opacity="0.12"/>
  <line x1="11" y1="13" x2="11" y2="7.5" stroke="#66ff99" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="11" y1="13" x2="15.8" y2="15.8" stroke="#66ff99" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="11" y1="13" x2="6.2" y2="15.8" stroke="#66ff99" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <circle cx="11" cy="13" r="2" fill="#66ff99" opacity="0.7"/>
  <circle cx="11" cy="13" r="0.8" fill="#0b1a0b"/>
  <!-- Right reel -->
  <circle cx="21" cy="13" r="6" fill="none" stroke="#66ff99" stroke-width="1.5" opacity="0.4"/>
  <circle cx="21" cy="13" r="4" fill="#66ff99" opacity="0.12"/>
  <line x1="21" y1="13" x2="21" y2="7.5" stroke="#66ff99" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="21" y1="13" x2="25.8" y2="15.8" stroke="#66ff99" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="21" y1="13" x2="16.2" y2="15.8" stroke="#66ff99" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <circle cx="21" cy="13" r="2" fill="#66ff99" opacity="0.7"/>
  <circle cx="21" cy="13" r="0.8" fill="#0b1a0b"/>
  <!-- Tape line between reels -->
  <line x1="11" y1="19.5" x2="21" y2="19.5" stroke="#66ff99" stroke-width="1" opacity="0.3"/>
  <!-- Bottom text hint -->
  <rect x="6" y="23" width="20" height="4" rx="1" fill="#66ff99" opacity="0.15"/>
  <rect x="8" y="24.2" width="4" height="1.6" rx="0.5" fill="#66ff99" opacity="0.4"/>
  <rect x="14" y="24.2" width="3" height="1.6" rx="0.5" fill="#66ff99" opacity="0.3"/>
  <rect x="19" y="24.2" width="5" height="1.6" rx="0.5" fill="#66ff99" opacity="0.4"/>
</svg>
