    <rect x="40" y="1" width="4" height="18" rx="2" fill="#66ff99"/>
    <rect x="48" y="4" width="4" height="12" rx="2" fill="#66ff99"/>
    <rect x="56" y="0" width="4" height="20" rx="2" fill="#66ff99"/>
    <rect x="64" y="5" width="4" height="10" rx="2" fill="#66ff99"/>
    <rect x="72" y="2" width="4" height="16" rx="2" fill="#66ff99"/>
    <rect x="80" y="7" width="4" height="6" rx="2" fill="#66ff99"/>
    <rect x="88" y="3" width="4" height="14" rx="2" fill="#66ff99"/>
