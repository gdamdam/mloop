  <text x="560" y="220" font-family="monospace" font-size="72" font-weight="900" fill="#e8eaed" letter-spacing="4">mloop</text>
  <!-- Tagline -->
  <text x="560" y="290" font-family="system-ui, sans-serif" font-size="28" fill="#8b949e">Browser Loop Station &amp; Sampler</text>
  <!-- Features -->
  <text x="560" y="360" font-family="system-ui, sans-serif" font-size="20" fill="#58a6ff">16 Pads</text>
  <text x="700" y="360" font-family="system-ui, sans-serif" font-size="20" fill="#58a6ff">3 Loop Tracks</text>
  <text x="890" y="360" font-family="system-ui, sans-serif" font-size="20" fill="#58a6ff">9 Effects</text>
  <text x="1020" y="360" font-family="system-ui, sans-serif" font-size="20" fill="#58a6ff">KAOS Pad</text>
