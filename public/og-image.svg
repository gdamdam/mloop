    <line x1="375" y1="0" x2="375" y2="630" stroke="#b388ff" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="630" stroke="#b388ff" stroke-width="1" />
    <line x1="525" y1="0" x2="525" y2="630" stroke="#b388ff" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="630" stroke="#b388ff" stroke-width="1" />
